name: Deploy to Google Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: presidio-internship-project
  GAR_LOCATION: us-central1
  REPOSITORY: presidio-repo
  SERVICE_AUTH: auth-service
  SERVICE_TASK: task-service
  REGION: us-central1

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Authorize Docker push to Google Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build and Push Auth Service Image
      run: |
        docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_AUTH }}:${{ github.sha }} ./auth-service
        docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_AUTH }}:${{ github.sha }}

    - name: Build and Push Task Service Image
      run: |
        docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_TASK }}:${{ github.sha }} ./task-service
        docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_TASK }}:${{ github.sha }}

    - name: Deploy Auth Service to Cloud Run
      id: deploy-auth
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_AUTH }}
        region: ${{ env.REGION }}
        image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_AUTH }}:${{ github.sha }}
        flags: '--allow-unauthenticated'

    - name: Deploy Task Service to Cloud Run
      id: deploy-task
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_TASK }}
        region: ${{ env.REGION }}
        image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_TASK }}:${{ github.sha }}
        flags: '--allow-unauthenticated'
